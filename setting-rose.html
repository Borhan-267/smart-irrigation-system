<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Plant</title>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
    <!-- Include Firebase scripts -->
    <script src="https://www.gstatic.com/firebasejs/8.4.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.4.1/firebase-database.js"></script>
    <!-- Custom scripts -->
    <script src="script.js"></script>
    <script src="setting-rose.js"></script>
    <script src="dashboard.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" type="text/css" href="setting-rose.css">
</head>
<body>
    <div id="container">
        <div id="title_container">
            <span id="content">
                <h2 class="typedtext"></h2>
            </span>
            <h2>Setting</h2>
        </div>

        <div id="form_container">
            <input placeholder="Soil Moisture (0-2500)" type="number" id="rose_soil_moisture"/>
        </div>

        <div id="button_container">
            <button id="submit" onclick="saveRose()">Save</button>
        </div>
    </div>
</body>
<script>
    
    function typingEffect() {
          const contactTexts = shuffleArray(['ROSE']);
          const typedtext = document.getElementsByClassName("typedtext")[0];
          let removing = false;
          let idx = char = 0;
    
          setInterval(() => { // We define the interval of the typing speed
    
              // If we do not reach the limit, we insert characters in the html
              if (char < contactTexts[idx].length) typedtext.innerHTML += contactTexts[idx][char];
    
              // 15*150ms = time before starting to remove characters
              if (char == contactTexts[idx].length + 15) removing = true;
    
              // Removing characters, the last one always
              if (removing) typedtext.innerHTML = typedtext.innerHTML.substring(0, typedtext.innerHTML.length - 1);
    
              char++; // Next character
    
              // When there is nothing else to remove
              if (typedtext.innerHTML.length === 0) {
    
                  // If we get to the end of the texts we start over
                  if (idx === contactTexts.length - 1) idx = 0
                  else idx++;
    
                  char = 0; // Start the next text by the first character
                  removing = false; // No more removing characters
              }
    
          }, 150); // Typing speed, 150 ms
    
        }
          typingEffect();
          function shuffleArray(array) {
              let currentIndex = array.length,
                  temporaryValue, randomIndex;
    
              // While there remain elements to shuffle...
              while (0 !== currentIndex) {
    
                  // Pick a remaining element...
                  randomIndex = Math.floor(Math.random() * currentIndex);
                  currentIndex -= 1;
    
                  // And swap it with the current element.
                  temporaryValue = array[currentIndex];
                  array[currentIndex] = array[randomIndex];
                  array[randomIndex] = temporaryValue;
              }
    
              return array;
          }
      </script>
    
</script>
</html>
